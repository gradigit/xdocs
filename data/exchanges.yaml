exchanges:
  - exchange_id: binance
    display_name: Binance
    allowed_domains:
      - developers.binance.com
    sections:
      - section_id: spot
        base_urls: ["https://api.binance.com"]
        seed_urls: ["https://developers.binance.com/docs/binance-spot-api-docs/"]
      - section_id: futures_usdm
        base_urls: ["https://fapi.binance.com"]
        seed_urls: ["https://developers.binance.com/docs/derivatives/usds-margined-futures/"]
      - section_id: futures_coinm
        base_urls: ["https://dapi.binance.com"]
        seed_urls: ["https://developers.binance.com/docs/derivatives/coin-margined-futures/"]
      - section_id: portfolio_margin
        base_urls: ["https://papi.binance.com"]
        seed_urls: ["https://developers.binance.com/docs/derivatives/portfolio-margin/"]

  - exchange_id: okx
    display_name: OKX
    allowed_domains:
      - www.okx.com
    sections:
      - section_id: rest
        base_urls: ["https://www.okx.com"]
        seed_urls: ["https://www.okx.com/docs-v5/en/"]
      - section_id: websocket
        base_urls: ["wss://ws.okx.com:8443/ws/v5/public", "wss://ws.okx.com:8443/ws/v5/private", "wss://ws.okx.com:8443/ws/v5/business"]
        seed_urls: ["https://www.okx.com/docs-v5/en/#websocket-api"]

  - exchange_id: bybit
    display_name: Bybit
    allowed_domains:
      - bybit-exchange.github.io
    sections:
      - section_id: v5
        base_urls: ["https://api.bybit.com"]
        seed_urls: ["https://bybit-exchange.github.io/docs/v5/intro"]
      - section_id: websocket
        base_urls: ["wss://stream.bybit.com/v5/public", "wss://stream.bybit.com/v5/private"]
        seed_urls: ["https://bybit-exchange.github.io/docs/v5/ws/connect"]

  - exchange_id: bitget
    display_name: Bitget
    allowed_domains:
      - www.bitget.com
    sections:
      - section_id: v2
        base_urls: ["https://api.bitget.com"]
        seed_urls: ["https://www.bitget.com/api-doc/common/intro"]

  - exchange_id: gateio
    display_name: Gate.io
    allowed_domains:
      - www.gate.com
    sections:
      - section_id: v4
        base_urls: ["https://api.gateio.ws/api/v4"]
        seed_urls: ["https://www.gate.com/docs/developers/apiv4/"]
        inventory_policy:
          mode: link_follow
          render_mode: auto
          max_pages: 2000

  - exchange_id: kucoin
    display_name: KuCoin
    allowed_domains:
      - www.kucoin.com
    sections:
      - section_id: spot
        base_urls: ["https://api.kucoin.com"]
        seed_urls: ["https://www.kucoin.com/docs/rest/spot-trading/spot-hf-trade-pro-account/place-hf-order"]
        inventory_policy:
          mode: link_follow
          render_mode: auto
          max_pages: 5000
          scope_prefixes:
            - "https://www.kucoin.com/docs-new/"
      - section_id: futures
        base_urls: ["https://api-futures.kucoin.com"]
        seed_urls: ["https://www.kucoin.com/docs/rest/futures-trading/orders/place-order"]
        inventory_policy:
          mode: link_follow
          render_mode: auto
          max_pages: 5000
          scope_prefixes:
            - "https://www.kucoin.com/docs-new/"

